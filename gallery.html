<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Kashveil Tour and Travels</title>
    <link rel="icon" type="image/png" href="static/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { green: '#1b4332', lightgreen: '#2d6a4f', gold: '#d4af37', lightgold: '#f3e5ab' } },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Inter', 'sans-serif'], }
                }
            }
        }
    </script>
    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .hero-overlay { background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%); }
    </style>
</head>
<body class="font-sans antialiased text-gray-800 bg-gray-50">

    <nav id="navbar" class="fixed w-full z-50 transition-all duration-300 glass-nav py-2">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html"><img class="h-16 w-auto" src="static/images/logo.png" alt="Kashveil Logo"></a>
                </div>
                <div class="hidden md:flex space-x-8 items-center font-medium text-sm lg:text-base">
                    <a href="index.html" class="text-gray-800 hover:text-brand-gold transition-colors">HOME</a>
                    <a href="packages.html" class="text-gray-800 hover:text-brand-gold transition-colors">KASHMIR PACKAGES</a>
                    <a href="ladakh-expeditions.html" class="text-gray-800 hover:text-brand-gold transition-colors">LADAKH EXPEDITIONS</a>
                    <a href="about.html" class="text-gray-800 hover:text-brand-gold transition-colors">ABOUT US</a>
                    <a href="gallery.html" class="text-brand-green hover:text-brand-gold transition-colors">GALLERY</a>
                    <a href="contact.html" class="bg-brand-green text-white px-6 py-2 rounded-full hover:bg-brand-lightgreen hover:shadow-lg transition-all duration-300 border border-brand-green">BOOK NOW</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative h-[40vh] min-h-[300px] flex items-center justify-center pt-20">
        <div class="absolute inset-0 z-0">
            <img src="static/images/mountain-land-horse.jpg" alt="Gallery" class="w-full h-full object-cover">
            <div class="absolute inset-0 hero-overlay"></div>
        </div>
        <div class="relative z-10 text-center px-4 w-full max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-serif text-white font-bold mb-4 drop-shadow-lg tracking-wide uppercase">Our Gallery</h1>
            <p class="text-lg md:text-xl text-white drop-shadow-md font-light">Glimpses of Paradise on Earth</p>
        </div>
    </header>

    <section class="py-16 bg-gray-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 auto-rows-[200px]">
                <div class="row-span-2 col-span-2 md:col-span-1 rounded-xl overflow-hidden group">
                    <img src="static/images/dal-lake.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="rounded-xl overflow-hidden group">
                    <img src="static/images/scene.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="row-span-2 rounded-xl overflow-hidden group">
                    <img src="static/images/vertical.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="row-span-2 rounded-xl overflow-hidden group">
                    <img src="static/images/vertical-mountain-blue-sky.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="col-span-2 rounded-xl overflow-hidden group">
                    <img src="static/images/dal-lake-2.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="rounded-xl overflow-hidden group">
                    <img src="static/images/mountain-land-horse.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-brand-green text-white pt-16 pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-400 border-t border-white/20 mt-12">
            <p>&copy; 2026 Kashveil Tour and Travels. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
